<!DOCTYPE html>
<html>
<head>
<style>
  body{font-family:sans-serif;margin:0;padding:12px;font-size:12px}
  #bridge{padding:8px 10px;border-radius:6px;background:#f6f8fa;margin-bottom:10px;color:#666}
  #bridge.ok{background:#e3f9e5;color:#1a7f37}
  #bridge.error{background:#ffeef0;color:#cf222e}
  #bridge.loading{color:#888}
  #status{padding:8px 10px;border-radius:6px;background:#f0f0f0;margin-bottom:10px;min-height:20px}
  #status.ok{background:#e3f9e5;color:#1a7f37}
  #status.error{background:#ffeef0;color:#cf222e}
  #status.loading{color:#888}
  #hint{font-size:11px;color:#666;line-height:1.5;margin-bottom:10px}
  button{width:100%;padding:7px;border:none;border-radius:5px;background:#111827;color:#fff;cursor:pointer;font-size:12px}
  button:hover{background:#0f172a}
  #log{margin-top:8px;font-size:10px;color:#999;height:86px;overflow-y:auto}
</style>
</head>
<body>
<div id="bridge" class="loading">Connecting to Bridge SSE...</div>
<div id="status" class="loading">Initializing...</div>
<div id="hint">The plugin does not extract automatically by default. It only runs and returns results after receiving a Bridge command such as extract-node-defs or extract-image-asset.</div>
<button id="reconnect-button" type="button">Reconnect SSE</button>
<button id="get-node-id-button" type="button" style="margin-top:6px;background:#2563eb">Get selected node ID</button>
<div id="node-id" style="margin-top:6px;padding:6px 10px;border-radius:6px;background:#f6f8fa;font-family:monospace;font-size:11px;color:#333;display:none;word-break:break-all;cursor:pointer" title="Click to copy"></div>
<div id="log"></div>
<!-- WS_DEFS_RUNTIME_CONFIG_SCRIPT -->
<!-- WS_DEFS_UI_BUNDLE_SCRIPT -->
</body>
</html>
